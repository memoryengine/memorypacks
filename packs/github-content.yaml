      topic: "github-content"
    content: |
      # GitHub Content Extraction — Issues, PRs, and Releases

      You have access to memory engine MCP tools and a GitHub repository. This skill teaches you to extract GitHub issues, pull requests, and releases into memory engine for semantic search, temporal queries, and cross-referencing with code.

      ## Prerequisites

      1. **me server running** with embedding daemon active
      2. **`gh` CLI** authenticated (`gh auth status` must succeed)
      3. **Repository context** — run from a directory with a GitHub remote, or specify `--repo owner/repo`

      ## What It Does

      Fetches structured data from GitHub's API via the `gh` CLI, transforms each issue, PR, and release into a memory with rich metadata, and stores them in memory engine. The embedding pipeline handles semantic search automatically.

      ## Configuration Options

      | Option | Default | Description |
      |--------|---------|-------------|
      | `treePrefix` | `<repo_name>` | ltree-safe project name (e.g., `my_project`) |
      | `entityTypes` | `["issues", "prs", "releases"]` | Which entity types to extract |
      | `maxItems` | `100` | Maximum items per entity type per run |
      | `state` | `"all"` | Filter: `open`, `closed`, `merged`, `all` |
      | `labelFilters` | `[]` | Only include items with these labels (empty = all) |
      | `since` | `null` | ISO date — only items updated after this date |

      ## Step 1: Detect Repository

      ```bash
      gh repo view --json nameWithOwner,name -q '.nameWithOwner'
      ```

      This gives you `owner/repo` for `meta.repo` and the repo name for tree paths. Convert the repo name to ltree-safe format (lowercase, replace hyphens with underscores).

      ## Step 2: Check for Existing Memories (Incremental)

      Before fetching, find the most recent memory for each entity type:

      ```
      me_memory_search({
        tree: "<treePrefix>.github.issues",
        meta: {source: "github"},
        limit: 1
      })
      ```

      If results exist, use the most recent `temporal.start` as the `--since` parameter to fetch only new/updated items.

      ## Step 3: Fetch and Transform

      For each entity type, fetch from GitHub, filter, and create memories:

      **Issues:**
      - Fetch: `gh issue list --state all --limit 100 --json number,title,body,author,state,labels,createdAt,closedAt,comments`
      - Skip: bot-created issues (author login ends with `[bot]` or is `dependabot`)
      - Skip: issues with 0-length body and 0 comments (empty issues)

      **Pull Requests:**
      - Fetch: `gh pr list --state all --limit 100 --json number,title,body,author,state,labels,createdAt,closedAt,mergedAt,comments,reviewDecision`
      - Skip: dependabot PRs, draft PRs with no comments
      - Include: `reviewDecision` (APPROVED, CHANGES_REQUESTED, etc.)

      **Releases:**
      - Fetch: `gh release list --limit 100 --json tagName,name,body,author,createdAt,isDraft,isPrerelease`
      - Skip: draft releases, releases with empty body

      ## Step 4: Condense Comments

      For issues and PRs with many comments, condense to stay under the ~8192 token embedding limit:

      - **≤5 comments**: include all verbatim
      - **>5 comments**: include first comment, last comment, and any comments from maintainers/the author
      - Add a note: `[... N comments condensed ...]`

      ## Step 5: Deduplicate

      Before creating, check if a memory already exists:

      ```
      me_memory_search({
        meta: {source: "github", repo: "owner/repo", entity_type: "issue", number: 42}
      })
      ```

      If found, compare content. If changed, update with `me_memory_update`. If identical, skip.

      ## Step 6: Create Memories

      For each item, create a memory using the schema conventions (see `me_memory_get({id: "019b0006-0002-7000-8000-000000000002"})`).

      Batch in groups of 50. Log progress: `[issues] 42/100 created, 8 skipped (bot), 3 updated`.

      ## Scope Limits

      - **100 items per entity type** per run, **300 total max**
      - For repos with >1000 items, use `--since` for incremental runs
      - If an issue/PR body exceeds 4000 characters, truncate with `[... truncated ...]`

      ## See Also
      - Schema conventions — `me_memory_get({id: "019b0006-0002-7000-8000-000000000002"})`
      - Pseudocode & CLI — `me_memory_get({id: "019b0006-0003-7000-8000-000000000003"})`
      - gh CLI reference — `me_memory_get({id: "019b0006-0004-7000-8000-000000000004"})`

  - id: "019b0006-0002-7000-8000-000000000002"
    tree: "schema"
    meta:
      type: "reference"
      topic: "github-content-schema"
    content: |
      # Schema Conventions — GitHub Content Memories

      This reference defines tree paths, meta fields, temporal mapping, and content templates for GitHub issues, PRs, and releases stored in memory engine.

      ## Tree Paths

      All GitHub content lives under `<treePrefix>.github.<entity_type>`:

      | Entity | Tree Path |
      |--------|-----------|
      | Issues | `<treePrefix>.github.issues` |
      | Pull Requests | `<treePrefix>.github.prs` |
      | Releases | `<treePrefix>.github.releases` |

      Example: issue #42 in repo `my_project` → tree: `my_project.github.issues`

      All memories for one entity type share the same tree path. Individual items are distinguished by `meta.number` (or `meta.tag` for releases).

      ## Meta Fields

      ### Common Fields (all entity types)

      | Field | Type | Required | Description |
      |-------|------|----------|-------------|
      | `source` | string | Yes | Always `"github"` |
      | `repo` | string | Yes | `"owner/repo"` format (e.g., `"timescale/pg_textsearch"`) |
      | `entity_type` | string | Yes | `"issue"`, `"pr"`, or `"release"` |
      | `author` | string | Yes | GitHub login of the creator |

      ### Issues and PRs

      | Field | Type | Required | Description |
      |-------|------|----------|-------------|
      | `number` | number | Yes | Issue/PR number (e.g., `42`) |
      | `state` | string | Yes | `"open"`, `"closed"`, or `"merged"` (PRs only) |
      | `labels` | array | No | Label names as strings (e.g., `["bug", "p1"]`) |

      ### Releases

      | Field | Type | Required | Description |
      |-------|------|----------|-------------|
      | `tag` | string | Yes | Release tag (e.g., `"v1.2.3"`) |
      | `prerelease` | boolean | No | `true` if pre-release |

      ## Temporal Mapping

      | Entity State | `temporal.start` | `temporal.end` |
      |-------------|-------------------|----------------|
      | Open issue/PR | `createdAt` | *(omitted)* |
      | Closed issue | `createdAt` | `closedAt` |
      | Merged PR | `createdAt` | `mergedAt` |
      | Closed PR (not merged) | `createdAt` | `closedAt` |
      | Release | `createdAt` | *(omitted)* |

      Temporal ranges enable queries like:
      - "issues resolved last week" → `temporal: {within: ["2025-01-20", "2025-01-27"]}`
      - "PRs open during the outage" → `temporal: {contains: "2025-01-15T03:00:00Z"}`

      ## Content Templates

      ### Issue

      ```
      ## Issue #<number>: <title>

      Repo: <owner/repo>
      State: <open|closed>
      Author: @<login>
      Labels: <label1>, <label2>
      Created: <date>
      Closed: <date> (if closed)

      <body — truncated to 4000 chars if needed>

      ### Comments (<count> total)

      **@<author>** (<date>):
      <comment body>

      [... N comments condensed ...]
      ```

      ### Pull Request

      ```
      ## PR #<number>: <title>

      Repo: <owner/repo>
      State: <open|closed|merged>
      Author: @<login>
      Labels: <label1>, <label2>
      Review: <APPROVED|CHANGES_REQUESTED|REVIEW_REQUIRED|none>
      Created: <date>
      Merged: <date> (if merged) | Closed: <date> (if closed)

      <body — truncated to 4000 chars if needed>

      ### Comments (<count> total)

      **@<author>** (<date>):
      <comment body>

      [... N comments condensed ...]
      ```

      ### Release

      ```
      ## Release <tag>: <name>

      Repo: <owner/repo>
      Author: @<login>
      Pre-release: <yes|no>
      Created: <date>

      <body — release notes>
      ```

      ## Search Patterns

      **Find a specific issue by number:**
      ```
      me_memory_search({meta: {source: "github", repo: "owner/repo", entity_type: "issue", number: 42}})
      ```

      **Find all open bugs:**
      ```
      me_memory_search({meta: {source: "github", entity_type: "issue", state: "open", labels: ["bug"]}})
      ```

      **Find PRs by concept:**
      ```
      me_memory_search({semantic: "authentication refactor", meta: {source: "github", entity_type: "pr"}})
      ```

      **Find releases by tag:**
      ```
      me_memory_search({meta: {source: "github", entity_type: "release", tag: "v1.2.3"}})
      ```

      **Issues resolved in a time range:**
      ```
      me_memory_search({
        meta: {source: "github", entity_type: "issue", state: "closed"},
        temporal: {within: ["2025-01-01", "2025-02-01"]}
      })
      ```

      **Browse all GitHub content for a repo:**
      ```
      me_memory_search({tree: "my_project.github.*", meta: {source: "github"}})
      ```

      ## Interop with git_history

      The `git_history` pack stores commit memories under `<treePrefix>.git`. GitHub content lives under `<treePrefix>.github`. Both use the same `treePrefix`, enabling combined queries:

      ```
      me_memory_search({tree: "my_project.*", semantic: "fix authentication bug"})
      ```

      **Note on repo identification:** `git_history` uses `meta.repo` as a plain repo name (e.g., `"my_project"`), while `github_content` uses `owner/repo` format (e.g., `"timescale/my_project"`). This distinction is intentional — GitHub content needs the owner to distinguish forks and enable cross-org queries. When joining data across packs, match on `treePrefix` rather than `meta.repo`.

