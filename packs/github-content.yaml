      type: "reference"
      topic: "github-content-pseudocode"
    content: |
      # Pseudocode & CLI — GitHub Content Extraction

      Language-agnostic algorithm and ready-to-use shell scripts for extracting GitHub content into memory engine.

      ## Algorithm

      ```
      function extractGitHubContent(config):
          repo = detectRepo()                          # gh repo view
          treePrefix = toLtree(repo.name)              # lowercase, hyphens→underscores

          for entityType in config.entityTypes:
              since = findLatestMemory(treePrefix, entityType)
              items = fetchFromGitHub(entityType, config, since)
              items = filterBots(items)
              items = filterEmpty(items, entityType)

              for item in items:
                  content = formatContent(item, entityType)  # apply template
                  meta = buildMeta(item, entityType, repo)
                  temporal = buildTemporal(item)

                  existing = findExisting(meta)
                  if existing and existing.content == content:
                      skip                                    # no change
                  else if existing:
                      me_memory_update(existing.id, content, meta, temporal)
                  else:
                      me_memory_create(content, tree, meta, temporal)
      ```

      ## Shell Script: Extract Issues

      ```bash
      #!/bin/bash
      set -euo pipefail

      REPO=$(gh repo view --json nameWithOwner -q '.nameWithOwner')
      REPO_NAME=$(echo "$REPO" | cut -d'/' -f2 | tr '-' '_' | tr '[:upper:]' '[:lower:]')
      TREE="${REPO_NAME}.github.issues"
      LIMIT=${MAX_ITEMS:-100}
      SINCE=${SINCE:-""}

      SINCE_FLAG=""
      if [ -n "$SINCE" ]; then
          SINCE_FLAG="--search \"updated:>=${SINCE}\""
      fi

      gh issue list --state all --limit "$LIMIT" --json \
          number,title,body,author,state,labels,createdAt,closedAt,comments \
          | jq -c '.[]' | while read -r item; do

          NUMBER=$(echo "$item" | jq -r '.number')
          AUTHOR=$(echo "$item" | jq -r '.author.login')
          STATE=$(echo "$item" | jq -r '.state')
          TITLE=$(echo "$item" | jq -r '.title')
          BODY=$(echo "$item" | jq -r '.body // "" | .[0:4000]')
          LABELS=$(echo "$item" | jq -r '[.labels[].name] | join(", ")')
          CREATED=$(echo "$item" | jq -r '.createdAt')
          CLOSED=$(echo "$item" | jq -r '.closedAt // empty')
          COMMENT_COUNT=$(echo "$item" | jq '.comments | length')

          # Skip bots
          if [[ "$AUTHOR" == *"[bot]" ]] || [[ "$AUTHOR" == "dependabot" ]]; then
              continue
          fi

          # Skip empty issues
          if [ -z "$BODY" ] && [ "$COMMENT_COUNT" -eq 0 ]; then
              continue
          fi

          # Build content
          CONTENT="## Issue #${NUMBER}: ${TITLE}\n\n"
          CONTENT+="Repo: ${REPO}\nState: ${STATE}\nAuthor: @${AUTHOR}\n"
          [ -n "$LABELS" ] && CONTENT+="Labels: ${LABELS}\n"
          CONTENT+="Created: ${CREATED}\n"
          [ -n "$CLOSED" ] && CONTENT+="Closed: ${CLOSED}\n"
          CONTENT+="\n${BODY}"

          # Build temporal
          TEMPORAL_START="$CREATED"
          TEMPORAL_END=""
          [ -n "$CLOSED" ] && TEMPORAL_END="$CLOSED"

          # Create/update via me CLI
          EXISTING=$(me search --meta "{\"source\":\"github\",\"repo\":\"${REPO}\",\"entity_type\":\"issue\",\"number\":${NUMBER}}" --limit 1 --format json 2>/dev/null || echo "")

          if [ -n "$EXISTING" ] && [ "$EXISTING" != "[]" ]; then
              EXISTING_ID=$(echo "$EXISTING" | jq -r '.[0].id')
              me update "$EXISTING_ID" --content "$(echo -e "$CONTENT")" \
                  --meta "{\"source\":\"github\",\"repo\":\"${REPO}\",\"entity_type\":\"issue\",\"number\":${NUMBER},\"author\":\"${AUTHOR}\",\"state\":\"${STATE}\"}"
          else
              TEMPORAL_FLAG="--temporal-start ${TEMPORAL_START}"
              [ -n "$TEMPORAL_END" ] && TEMPORAL_FLAG+=" --temporal-end ${TEMPORAL_END}"
              me create --tree "$TREE" --content "$(echo -e "$CONTENT")" \
                  --meta "{\"source\":\"github\",\"repo\":\"${REPO}\",\"entity_type\":\"issue\",\"number\":${NUMBER},\"author\":\"${AUTHOR}\",\"state\":\"${STATE}\"}" \
                  $TEMPORAL_FLAG
          fi
      done
      ```

      ## Shell Script: Extract PRs

      ```bash
      #!/bin/bash
      set -euo pipefail

      REPO=$(gh repo view --json nameWithOwner -q '.nameWithOwner')
      REPO_NAME=$(echo "$REPO" | cut -d'/' -f2 | tr '-' '_' | tr '[:upper:]' '[:lower:]')
      TREE="${REPO_NAME}.github.prs"
      LIMIT=${MAX_ITEMS:-100}

      gh pr list --state all --limit "$LIMIT" --json \
          number,title,body,author,state,labels,createdAt,closedAt,mergedAt,comments,reviewDecision \
          | jq -c '.[]' | while read -r item; do

          NUMBER=$(echo "$item" | jq -r '.number')
          AUTHOR=$(echo "$item" | jq -r '.author.login')
          TITLE=$(echo "$item" | jq -r '.title')
          BODY=$(echo "$item" | jq -r '.body // "" | .[0:4000]')
          CREATED=$(echo "$item" | jq -r '.createdAt')
          MERGED=$(echo "$item" | jq -r '.mergedAt // empty')
          CLOSED=$(echo "$item" | jq -r '.closedAt // empty')
          REVIEW=$(echo "$item" | jq -r '.reviewDecision // "none"')

          # Skip bots
          if [[ "$AUTHOR" == *"[bot]" ]] || [[ "$AUTHOR" == "dependabot" ]]; then
              continue
          fi

          # Determine state
          if [ -n "$MERGED" ]; then
              STATE="merged"
              TEMPORAL_END="$MERGED"
          elif [ -n "$CLOSED" ]; then
              STATE="closed"
              TEMPORAL_END="$CLOSED"
          else
              STATE="open"
              TEMPORAL_END=""
          fi

          CONTENT="## PR #${NUMBER}: ${TITLE}\n\n"
          CONTENT+="Repo: ${REPO}\nState: ${STATE}\nAuthor: @${AUTHOR}\n"
          CONTENT+="Review: ${REVIEW}\nCreated: ${CREATED}\n"
          [ -n "$MERGED" ] && CONTENT+="Merged: ${MERGED}\n"
          [ -n "$CLOSED" ] && [ -z "$MERGED" ] && CONTENT+="Closed: ${CLOSED}\n"
          CONTENT+="\n${BODY}"

          TEMPORAL_FLAG="--temporal-start ${CREATED}"
          [ -n "$TEMPORAL_END" ] && TEMPORAL_FLAG+=" --temporal-end ${TEMPORAL_END}"

          EXISTING=$(me search --meta "{\"source\":\"github\",\"repo\":\"${REPO}\",\"entity_type\":\"pr\",\"number\":${NUMBER}}" --limit 1 --format json 2>/dev/null || echo "")

          if [ -n "$EXISTING" ] && [ "$EXISTING" != "[]" ]; then
              EXISTING_ID=$(echo "$EXISTING" | jq -r '.[0].id')
              me update "$EXISTING_ID" --content "$(echo -e "$CONTENT")" \
                  --meta "{\"source\":\"github\",\"repo\":\"${REPO}\",\"entity_type\":\"pr\",\"number\":${NUMBER},\"author\":\"${AUTHOR}\",\"state\":\"${STATE}\"}"
          else
              me create --tree "$TREE" --content "$(echo -e "$CONTENT")" \
                  --meta "{\"source\":\"github\",\"repo\":\"${REPO}\",\"entity_type\":\"pr\",\"number\":${NUMBER},\"author\":\"${AUTHOR}\",\"state\":\"${STATE}\"}" \
                  $TEMPORAL_FLAG
          fi
      done
      ```

      ## Shell Script: Extract Releases

      ```bash
      #!/bin/bash
      set -euo pipefail

      REPO=$(gh repo view --json nameWithOwner -q '.nameWithOwner')
      REPO_NAME=$(echo "$REPO" | cut -d'/' -f2 | tr '-' '_' | tr '[:upper:]' '[:lower:]')
      TREE="${REPO_NAME}.github.releases"
      LIMIT=${MAX_ITEMS:-100}

      gh release list --limit "$LIMIT" --json \
          tagName,name,body,author,createdAt,isDraft,isPrerelease \
          | jq -c '.[]' | while read -r item; do

          TAG=$(echo "$item" | jq -r '.tagName')
          NAME=$(echo "$item" | jq -r '.name // .tagName')
          BODY=$(echo "$item" | jq -r '.body // ""')
          AUTHOR=$(echo "$item" | jq -r '.author.login')
          CREATED=$(echo "$item" | jq -r '.createdAt')
          IS_DRAFT=$(echo "$item" | jq -r '.isDraft')
          IS_PRERELEASE=$(echo "$item" | jq -r '.isPrerelease')

          # Skip drafts and empty releases
          [ "$IS_DRAFT" = "true" ] && continue
          [ -z "$BODY" ] && continue

          CONTENT="## Release ${TAG}: ${NAME}\n\n"
          CONTENT+="Repo: ${REPO}\nAuthor: @${AUTHOR}\n"
          [ "$IS_PRERELEASE" = "true" ] && CONTENT+="Pre-release: yes\n"
          CONTENT+="Created: ${CREATED}\n"
          CONTENT+="\n${BODY}"

          META="{\"source\":\"github\",\"repo\":\"${REPO}\",\"entity_type\":\"release\",\"tag\":\"${TAG}\",\"author\":\"${AUTHOR}\"}"
          [ "$IS_PRERELEASE" = "true" ] && META=$(echo "$META" | jq '. + {prerelease: true}')

          EXISTING=$(me search --meta "{\"source\":\"github\",\"repo\":\"${REPO}\",\"entity_type\":\"release\",\"tag\":\"${TAG}\"}" --limit 1 --format json 2>/dev/null || echo "")

          if [ -n "$EXISTING" ] && [ "$EXISTING" != "[]" ]; then
              EXISTING_ID=$(echo "$EXISTING" | jq -r '.[0].id')
              me update "$EXISTING_ID" --content "$(echo -e "$CONTENT")" --meta "$META"
          else
              me create --tree "$TREE" --content "$(echo -e "$CONTENT")" \
                  --meta "$META" --temporal-start "$CREATED"
          fi
      done
      ```

  - id: "019b0006-0004-7000-8000-000000000004"
    tree: "gh_cli"
    meta:
      type: "reference"
      topic: "github-content-gh-cli"
    content: |
      # gh CLI Reference — Commands and JSON Fields

      Exact `gh` commands, JSON output fields, pagination, rate limiting, and advanced queries for GitHub content extraction.

      ## Authentication Check

      ```bash
      gh auth status
      # Must show "Logged in to github.com" — fails if not authenticated
      ```

      ## Repository Detection

      ```bash
      # Full owner/repo
      gh repo view --json nameWithOwner -q '.nameWithOwner'
      # → "timescale/pg_textsearch"

      # Repo name only
      gh repo view --json name -q '.name'
      # → "pg_textsearch"

      # Explicit repo (not in a git directory)
      gh repo view owner/repo --json nameWithOwner -q '.nameWithOwner'
      ```

      ## Issues

      **List issues:**
      ```bash
      gh issue list --state all --limit 100 --json \
          number,title,body,author,state,labels,createdAt,closedAt,comments
      ```

      **JSON fields:**
      | Field | Type | Notes |
      |-------|------|-------|
      | `number` | int | Issue number |
      | `title` | string | |
      | `body` | string | Markdown body (may be null) |
      | `author` | object | `.login` for username |
      | `state` | string | `"OPEN"` or `"CLOSED"` — normalize to lowercase |
      | `labels` | array | Each has `.name` |
      | `createdAt` | string | ISO 8601 |
      | `closedAt` | string | ISO 8601 or null |
      | `comments` | array | Each has `.author.login`, `.body`, `.createdAt` |

      **Filter by label:**
      ```bash
      gh issue list --label "bug" --state all --limit 100 --json ...
      ```

      **Search with date filter:**
      ```bash
      gh issue list --search "updated:>=2025-01-01" --state all --limit 100 --json ...
      ```

      ## Pull Requests

      **List PRs:**
      ```bash
      gh pr list --state all --limit 100 --json \
          number,title,body,author,state,labels,createdAt,closedAt,mergedAt,comments,reviewDecision
      ```

      **JSON fields:**
      | Field | Type | Notes |
      |-------|------|-------|
      | `number` | int | PR number |
      | `title` | string | |
      | `body` | string | Markdown body (may be null) |
      | `author` | object | `.login` for username |
      | `state` | string | `"OPEN"`, `"CLOSED"`, or `"MERGED"` — normalize to lowercase |
      | `labels` | array | Each has `.name` |
      | `createdAt` | string | ISO 8601 |
      | `closedAt` | string | ISO 8601 or null |
      | `mergedAt` | string | ISO 8601 or null |
      | `comments` | array | Each has `.author.login`, `.body`, `.createdAt` |
      | `reviewDecision` | string | `"APPROVED"`, `"CHANGES_REQUESTED"`, `"REVIEW_REQUIRED"`, or `""` |

      **Filter by base branch:**
      ```bash
      gh pr list --base main --state all --limit 100 --json ...
      ```

      ## Releases

      **List releases:**
      ```bash
      gh release list --limit 100 --json \
          tagName,name,body,author,createdAt,isDraft,isPrerelease
      ```

      **JSON fields:**
      | Field | Type | Notes |
      |-------|------|-------|
      | `tagName` | string | e.g., `"v1.2.3"` |
      | `name` | string | Release title (may equal tagName) |
      | `body` | string | Release notes markdown |
      | `author` | object | `.login` for username |
      | `createdAt` | string | ISO 8601 |
      | `isDraft` | boolean | Skip if true |
      | `isPrerelease` | boolean | Store in `meta.prerelease` |

      **View a specific release:**
      ```bash
      gh release view v1.2.3 --json tagName,name,body,author,createdAt
      ```

      ## Pagination

      The `--limit` flag controls the maximum number of results. `gh` handles pagination internally up to the specified limit.

      **For >1000 items** (gh CLI limit), use the GraphQL API:
      ```bash
      gh api graphql -f query='
        query($cursor: String) {
          repository(owner: "owner", name: "repo") {
            issues(first: 100, after: $cursor, orderBy: {field: UPDATED_AT, direction: DESC}) {
              pageInfo { hasNextPage endCursor }
              nodes {
                number title body
                author { login }
                state
                labels(first: 10) { nodes { name } }
                createdAt closedAt
                comments(first: 5) {
                  nodes { author { login } body createdAt }
                }
              }
            }
          }
        }
      ' -F cursor="$CURSOR"
      ```

      Pass `endCursor` as `$CURSOR` for the next page. Loop until `hasNextPage` is `false`.

      ## Rate Limiting

      ```bash
      # Check current rate limit
      gh api rate_limit --jq '.rate | "\(.remaining)/\(.limit) (resets \(.reset | todate))"'
      ```

      - REST API: 5000 requests/hour (authenticated)
      - GraphQL: 5000 points/hour
      - `gh issue list --limit 100` = 1 REST request (paginated internally)
      - For large repos: add 1-second delay between entity types to stay well within limits

      ## Bot Detection

      Common bot patterns to filter out:

      | Pattern | Example |
      |---------|---------|
      | Login ends with `[bot]` | `dependabot[bot]`, `renovate[bot]`, `codecov[bot]` |
      | Login is `dependabot` | Legacy dependabot account |
      | Login ends with `-bot` | `mergify-bot`, `stale-bot` |
      | Login is `github-actions` | GitHub Actions bot |

      Filter in jq:
      ```bash
      | jq '[.[] | select(.author.login | test("\\[bot\\]$|^dependabot$|-bot$|^github-actions$") | not)]'
      ```

      ## Advanced: Fetch Issue/PR with Full Comments

      The list commands include comments inline. For issues/PRs with >100 comments, fetch individually:

      ```bash
      # Get full comment thread for an issue
      gh api "repos/owner/repo/issues/42/comments" --paginate --jq '.[].body'

      # Get review comments for a PR (inline code comments)
      gh api "repos/owner/repo/pulls/42/comments" --paginate \
          --jq '.[] | "\(.user.login): \(.body)"'
      ```
