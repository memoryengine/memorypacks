    tree: "schema"
    meta:
      type: "reference"
      topic: "git-history-schema"
    content: |
      # Memory Schema Conventions — Git History

      Exact conventions for git commit memories created by the git history extraction skill. Follow these to ensure consistency, searchability, and interoperability.

      ## Tree Path

      Format: `<optional_prefix>.<repo_name>.git_history`

      | Configuration | Tree Path |
      |--------------|-----------|
      | Default (no prefix) | `my_api.git_history` |
      | With prefix | `work.projects.my_api.git_history` |

      The repo name must be ltree-safe: lowercase, underscores only. Convert hyphens to underscores (`my-api` → `my_api`).

      ## Meta Fields

      ```json
      {
        "source": "git",
        "repo": "<repo_name>",
        "commit": "<full_40_char_sha>",
        "author": "<author_email>",
        "branch": "<branch_ref>"
      }
      ```

      | Field | Type | Required | Purpose |
      |-------|------|----------|---------|
      | `source` | string | Yes | Always `"git"` — enables filtering all git-sourced memories |
      | `repo` | string | Yes | ltree-safe repo name — scopes searches to one repo |
      | `commit` | string | Yes | Full 40-character SHA — unique key for dedup |
      | `author` | string | Yes | Author email — enables per-author queries |
      | `branch` | string | No | Branch ref (e.g., `refs/heads/main`) — useful for multi-branch imports |

      ## Temporal

      ```json
      {"start": "<commit_author_date_iso>"}
      ```

      Point-in-time only (no `end` date). Uses the commit's author date in ISO 8601 format. This enables temporal range queries like "what changed last week."

      ## Content Template — Depth Levels

      ### `metadata` — Minimal

      ```markdown
      # <commit_subject>

      **Commit**: <sha_short>
      **Author**: <author_email>
      **Date**: <iso_date>

      <commit_body_if_present>
      ```

      ### `files` — Default

      ```markdown
      # <commit_subject>

      **Commit**: <sha_short>
      **Author**: <author_email>
      **Date**: <iso_date>

      <commit_body_if_present>

      ## Files Changed
      - M src/auth.ts
      - A src/middleware/rate-limit.ts
      - D src/legacy/old-auth.ts
      ```

      File status prefixes: `A` (added), `M` (modified), `D` (deleted), `R` (renamed).

      ### `diff_summary` — With Stats

      Adds insertion/deletion counts per file after the file list:

      ```markdown
      ## Files Changed
      - M src/auth.ts
      - A src/middleware/rate-limit.ts

      ## Diff Summary
       src/auth.ts                    | 12 +++---
       src/middleware/rate-limit.ts    | 45 ++++++++++++
       2 files changed, 45 insertions(+), 12 deletions(-)
      ```

      Generated via `git diff-tree --stat <sha>`.

      ### `full_diff` — Complete Diff

      Appends the full patch output after the diff summary. Use with caution — large diffs may exceed embedding token limits (8192 tokens). Generated via `git diff-tree -p <sha>`.

      ## Search Patterns

      Common queries agents run against git history memories:

      ```
      # All commits in a repo
      me_memory_search({meta: {source: "git", repo: "my_api"}})

      # Commits by a specific author
      me_memory_search({meta: {source: "git", repo: "my_api", author: "dev@example.com"}})

      # Semantic search for what changed
      me_memory_search({semantic: "rate limiting implementation", meta: {source: "git"}})

      # Keyword search for specific files
      me_memory_search({fulltext: "rate-limit.ts", meta: {source: "git"}})

      # Temporal range — what changed last week
      me_memory_search({
        meta: {source: "git", repo: "my_api"},
        temporal: {overlaps: ["2026-02-24T00:00:00Z", "2026-03-03T00:00:00Z"]}
      })
      ```

