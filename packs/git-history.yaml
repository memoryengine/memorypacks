    tree: "extraction"
    meta:
      type: "skill"
      topic: "git-history"
    content: |
      # Git History Extraction — Build a Script to Backfill & Sync Git Commits into Memory Engine

      You have access to a git repository and memory engine MCP tools. This skill teaches you to build a script that backfills commit history into searchable memories and can be re-run incrementally to stay current.

      ## What to Extract

      Create one memory per non-trivial commit containing:
      - SHA (short and full), author, date, commit message
      - List of changed files with A/M/D status
      - Optionally: diff summary or full diff

      Skip:
      - Merge commits with no unique content (auto-generated merge messages)
      - Empty commits
      - Commits matching configurable ignore patterns (e.g., `chore: bump version`, `Merge branch`)
      - Commits that touch only lock files or generated artifacts

      ## How to Extract

      1. **Detect repo name** from `git remote get-url origin` (extract the repo name from the URL) or fall back to the directory name.

      2. **Accept configuration**:
         - `treePrefix` — optional prefix before `<repo>.git_history` (default: none)
         - `depth` — one of `metadata`, `files` (default), `diff_summary`, `full_diff`
         - `maxCommits` — maximum commits per run (default: 200)
         - `pathFilters` — optional list of path globs to restrict commits
         - `ignorePatterns` — regexes to skip matching commit subjects

      3. **Incremental check** — find the latest already-imported SHA:
         ```
         me_memory_search({meta: {source: "git", repo: "<name>"}, limit: 1, order_by: "desc"})
         ```
         The `order_by: "desc"` sorts by temporal descending so the most recent commit is first. If a result exists, extract its `meta.commit` SHA.

      4. **Run git log**:
         - Full backfill: `git log --format='%H|%ae|%aI|%s' --reverse -<maxCommits>`
         - Incremental: `git log --format='%H|%ae|%aI|%s' --reverse <last_sha>..HEAD`
         - With path filters: append `-- <paths>`

      5. **Parse each commit**: split on `|` to get SHA, author email, ISO date, subject. For body: `git log -1 --format='%b' <sha>`.

      6. **Dedup check** — before creating, search for the exact commit:
         ```
         me_memory_search({meta: {source: "git", commit: "<sha>"}})
         ```
         Skip creation if a match exists.

      7. **Get file list** (if depth >= `files`):
         ```bash
         git diff-tree --no-commit-id --name-status -r <sha>
         ```

      8. **Format content** per depth level (see schema memory: `me_memory_get({id: "019b0005-0004-7000-8000-000000000004"})`).

      9. **Create memories** via `me_memory_create()` for individual commits or `me_memory_batchCreate()` for bulk. Set tree, meta, and temporal fields per the schema conventions.

      ## Example Output

      ```
      me_memory_create({
        content: "# Add rate limiting middleware\n\n**Commit**: a1b2c3d\n**Author**: dev@example.com\n**Date**: 2026-02-15T10:30:00Z\n\nImplement token-bucket rate limiter for all API endpoints.\nConfigurable per-route limits via route metadata.\n\n## Files Changed\n- A src/middleware/rate-limit.ts\n- M src/server/routes.ts\n- M src/config.ts\n- A src/middleware/rate-limit.test.ts",
        tree: "my_api.git_history",
        meta: {
          source: "git",
          repo: "my_api",
          commit: "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2",
          author: "dev@example.com",
          branch: "refs/heads/main"
        },
        temporal: {start: "2026-02-15T10:30:00Z"}
      })
      ```

      ## Scope Control

      - Default: 200 commits per run. Pass `maxCommits` to override.
      - Incremental mode processes only new commits since the last import — re-running is cheap.
      - For initial backfill of large repos, run in batches: `maxCommits=200`, then re-run incrementally.
      - Configurable path filters and ignore patterns prevent noise.

