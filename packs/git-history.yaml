      - Shell script & pseudocode — `me_memory_get({id: "019b0005-0003-7000-8000-000000000003"})`
      - Memory schema conventions — `me_memory_get({id: "019b0005-0004-7000-8000-000000000004"})`

  - id: "019b0005-0003-7000-8000-000000000003"
    tree: "pseudocode"
    meta:
      type: "reference"
      topic: "git-history-pseudocode"
    content: |
      # Shell Script & Pseudocode — Git History Extraction

      Language-agnostic algorithm and a working shell script for extracting git history into memory engine. The recommended approach generates a YAML file and uses `me memory import` for maximum speed.

      ## Recommended: Shell Script with YAML Batch Import

      This is the fastest approach — generates a YAML file of all commits, then imports in one shot.

      ```bash
      #!/bin/bash
      set -euo pipefail

      REPO="my_api"       # ltree-safe: lowercase, underscores only
      TREE="${REPO}.git_history"
      BRANCH="refs/heads/main"
      OUTFILE="/tmp/git-history-${REPO}.yaml"

      # --- Find sync cursor ---
      CURSOR_JSON=$(me memory search --meta "{\"source\":\"git\",\"repo\":\"${REPO}\",\"type\":\"sync_cursor\"}" --limit 1 --json 2>/dev/null || echo "[]")
      CURSOR_ID=$(echo "$CURSOR_JSON" | jq -r '.[0].id // empty')
      LAST_SHA=$(echo "$CURSOR_JSON" | jq -r '.[0].meta.last_commit // empty')
      PREV_TOTAL=$(echo "$CURSOR_JSON" | jq -r '.[0].meta.total_imported // 0')

      # --- Determine git log range ---
      RANGE_ARGS=""
      if [ -n "$LAST_SHA" ]; then
        if git cat-file -t "$LAST_SHA" &>/dev/null; then
          RANGE_ARGS="${LAST_SHA}..HEAD"
        fi
      fi

      # --- Generate YAML file ---
      # IMPORTANT: File must be a flat YAML list (no "memories:" wrapper)
      # IMPORTANT: temporal is a plain ISO string, NOT {start: "..."}
      # IMPORTANT: Content lines must be indented 4+ spaces to avoid YAML parsing
      #            issues with lines starting with "- " (file change lists)

      > "$OUTFILE"

      git log --format='%H	%ae	%aI	%s' --reverse $RANGE_ARGS | while IFS=$'\t' read -r SHA AUTHOR DATE SUBJECT; do
        # Skip merge commits
        if echo "$SUBJECT" | grep -qE '^Merge (branch|pull request|remote-tracking) '; then
          continue
        fi

        SHORT="${SHA:0:7}"
        BODY=$(git log -1 --format='%b' "$SHA" | head -20)
        RAW_FILES=$(git diff-tree --no-commit-id --name-status -r "$SHA" 2>/dev/null || true)

        {
          echo "- content: |"
          echo "    # ${SUBJECT}"
          echo ""
          echo "    **Commit**: ${SHORT}"
          echo "    **Author**: ${AUTHOR}"
          echo "    **Date**: ${DATE}"

          if [ -n "$BODY" ]; then
            echo ""
            echo "$BODY" | sed 's/^/    /'
          fi

          if [ -n "$RAW_FILES" ]; then
            echo ""
            echo "    ## Files Changed"
            echo "$RAW_FILES" | while IFS= read -r fline; do
              echo "    - ${fline}"
            done
          fi

          echo "  tree: \"${TREE}\""
          echo "  meta:"
          echo "    source: \"git\""
          echo "    repo: \"${REPO}\""
          echo "    commit: \"${SHA}\""
          echo "    author: \"${AUTHOR}\""
          echo "    branch: \"${BRANCH}\""
          echo "  temporal: \"${DATE}\""
        } >> "$OUTFILE"
      done

      # --- Validate before importing ---
      echo "Validating..."
      me memory import --dry-run "$OUTFILE"

      # --- Import ---
      echo "Importing..."
      me memory import "$OUTFILE"

      # --- Upsert sync cursor ---
      LAST_IMPORTED_SHA=$(git log -1 --format='%H' $RANGE_ARGS)
      LAST_IMPORTED_DATE=$(git log -1 --format='%aI' $RANGE_ARGS)
      # Note: variables set inside a piped while loop are lost (subshell).
      # Use grep to count entries in the generated file instead.
      ACTUAL_COUNT=$(grep -c '^- content:' "$OUTFILE")
      NEW_TOTAL=$((PREV_TOTAL + ACTUAL_COUNT))

      CURSOR_CONTENT="Sync cursor for ${REPO}. Last: ${LAST_IMPORTED_SHA:0:7} (${LAST_IMPORTED_DATE}). Total: ${NEW_TOTAL} commits."
      CURSOR_META="{\"source\":\"git\",\"repo\":\"${REPO}\",\"type\":\"sync_cursor\",\"last_commit\":\"${LAST_IMPORTED_SHA}\",\"last_date\":\"${LAST_IMPORTED_DATE}\",\"total_imported\":${NEW_TOTAL}}"

      if [ -n "$CURSOR_ID" ]; then
        me memory update --id "$CURSOR_ID" --content "$CURSOR_CONTENT" --meta "$CURSOR_META"
      else
        me memory create --content "$CURSOR_CONTENT" --tree "$TREE" --meta "$CURSOR_META"
      fi

      echo "Done: ${ACTUAL_COUNT} memories imported"
      ```

      ## Common YAML Pitfalls

      These are real errors encountered when generating YAML for `me memory import`:

      | Problem | Cause | Fix |
      |---------|-------|-----|
      | `Missing required field 'content'` | File wrapped in `memories:` key | Use flat list: file starts with `- content:` |
      | `Invalid temporal: Invalid input` | Temporal is `{start: "..."}` object | Use plain string: `temporal: "2026-02-15T10:30:00Z"` |
      | `A block sequence may not be used as an implicit map key` | `- M src/file.ts` in content parsed as YAML list | Indent all content lines 4+ spaces under `content: \|` |
      | Count shows 0 after loop | Variable incremented inside piped `while` (subshell) | Use `grep -c '^- content:' file` to count entries |

      ## Algorithm Pseudocode

      ```
      function extract_git_history(config):
          repo = detect_repo_name()
          tree = build_tree_path(config.prefix, repo)

          # Step 1: Find sync cursor
          cursor = me.memory.search(meta={source: "git", repo: repo, type: "sync_cursor"}, limit=1)
          range = null
          previous_total = 0

          if cursor exists:
              last_sha = cursor.meta.last_commit
              previous_total = cursor.meta.total_imported
              if git_cat_file_exists(last_sha):
                  range = last_sha + "..HEAD"
              else:
                  since_date = cursor.meta.last_date  # fallback

          # Step 2: Fetch commits (tab-delimited for shell, NUL for programmatic)
          commits = git_log(format="%H\t%ae\t%aI\t%s", reverse=true, range=range)

          # Step 3: Filter merge commits
          commits = [c for c in commits if not matches_ignore_pattern(c.subject)]

          # Step 4: Bulk dedup (only when cursor SHA was missing)
          if cursor exists and range is null:
              recent = me.memory.search(meta={source: "git", repo: repo}, limit=200, order_by="desc")
              existing_shas = set(r.meta.commit for r in recent)
              commits = [c for c in commits if c.sha not in existing_shas]

          # Step 5: Generate YAML and import via CLI (fastest)
          write_yaml_file(commits, tree, repo)  # flat list, plain string temporal
          validate: me_cli("memory import --dry-run /tmp/git-history.yaml")
          import:   me_cli("memory import /tmp/git-history.yaml")

          # Step 6: Upsert sync cursor
          if any commits created:
              upsert_cursor(cursor, repo, tree, last_sha, last_date, total)
      ```

