  - id: "019b0005-0001-7000-8000-000000000001"
    tree: "extraction"
    meta:
      type: "skill"
      topic: "git-history"
    content: |
      # Git History Extraction — Build a Script to Backfill & Sync Git Commits into Memory Engine

      You have access to a git repository and memory engine MCP tools. This skill teaches you to build a script that backfills commit history into searchable memories and can be re-run incrementally to stay current.

      Reference implementation: `integrations/git-history/git-history.ts`

      ## What to Extract

      Create one memory per non-trivial commit containing:
      - SHA (short and full), author, date, commit message
      - List of changed files with A/M/D status
      - Optionally: diff summary or full diff

      Skip:
      - Merge commits with no unique content (auto-generated merge messages)
      - Empty commits
      - Commits matching configurable ignore patterns (e.g., `Merge branch`, `Merge pull request`)

      ## How to Extract

      1. **Detect repo name** from `git remote get-url origin` (extract the repo name from the URL) or fall back to the directory name. Convert to ltree-safe format: lowercase, hyphens to underscores, strip non-alphanumeric.

      2. **Accept configuration**:
         - `prefix` — optional prefix before `<repo>.git_history` (default: none)
         - `depth` — one of `metadata`, `files` (default)
         - `max` — maximum commits per run (default: unlimited)
         - `since` — only commits after this ISO date
         - `branch` — branch to log (default: current HEAD)

      3. **Incremental check — sync cursor**: search for a dedicated cursor memory:
         ```
         me_memory_search({meta: {source: "git", repo: "<name>", type: "sync_cursor"}, limit: 1})
         ```
         The cursor memory tracks `last_commit` (SHA), `last_date` (ISO), and `total_imported` (count). If found:
         - Verify the SHA still exists: `git cat-file -t <sha>` — if it succeeds, use `<sha>..HEAD` as the git log range.
         - If the SHA is missing (force-push, rebase), fall back to date-based filtering using `last_date` as `--after`, and perform **bulk dedup** (see step 6).

      4. **Run git log** with tab delimiter (safe and easy to parse in shell):
         - Full backfill: `git log --format='%H\t%ae\t%aI\t%s' --reverse`
         - Incremental: `git log --format='%H\t%ae\t%aI\t%s' --reverse <last_sha>..HEAD`
         - With date filter: append `--after=<date>`

         Note: NUL delimiters (`%x00`) are theoretically safer but cause issues with shell tools like `grep` and `cut`. Tab delimiters work reliably across all shell environments. For programmatic use (TypeScript/Python), NUL delimiters remain a valid choice.

      5. **Parse each commit**: split each line on tab to get SHA, author email, ISO date, subject. For body: `git log -1 --format='%b' <sha>`.

      6. **Dedup (cursor fallback only)** — when the cursor SHA was not found and date-based fallback is used, fetch recent imports in bulk and exclude already-imported SHAs:
         ```
         results = me_memory_search({meta: {source: "git", repo: "<name>"}, limit: 200, order_by: "desc"})
         existing_shas = set(r.meta.commit for r in results)
         commits = [c for c in commits if c.sha not in existing_shas]
         ```
         This single bulk query replaces per-commit dedup checks (avoids N+1 queries).

      7. **Get file list** (if depth is `files`):
         ```bash
         git diff-tree --no-commit-id --name-status -r <sha>
         ```

      8. **Format content** per depth level (see schema memory: `me_memory_get({id: "019b0005-0004-7000-8000-000000000004"})`).

      9. **Batch create memories** — the fastest approach is to generate a YAML file and use `me memory import`:

         **IMPORTANT — YAML format gotchas:**
         - The file must be a **flat YAML list** (starts with `- content: |`). Do NOT wrap in a `memories:` key — that format is for packs only.
         - The `temporal` field must be a **plain ISO string** (e.g., `temporal: "2026-02-15T10:30:00Z"`), NOT an object like `{start: "..."}`. The object format is for the MCP API only.
         - File change lines starting with `- ` inside a YAML block scalar (`|`) will break YAML parsing if not indented deeper than the block indicator. Ensure all content lines are indented at least 4 spaces (2 beyond the `content: |` key).

         ```yaml
         - content: |
             # Add rate limiting middleware

             **Commit**: a1b2c3d
             **Author**: dev@example.com
             **Date**: 2026-02-15T10:30:00Z

             ## Files Changed
             - A src/middleware/rate-limit.ts
             - M src/server/routes.ts
           tree: "my_api.git_history"
           meta:
             source: "git"
             repo: "my_api"
             commit: "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2"
             author: "dev@example.com"
             branch: "refs/heads/main"
           temporal: "2026-02-15T10:30:00Z"
         ```

         Then import: `me memory import /tmp/git-history.yaml`

         Always validate first with `--dry-run`: `me memory import --dry-run /tmp/git-history.yaml`

         For MCP-only environments (no CLI), use `me_memory_create()` per commit — but this is much slower for large repos.

      10. **Upsert sync cursor** after import succeeds. Create or update the cursor memory with the last processed SHA, date, and running total:
          ```
          me_memory_update({id: cursor.id, content: "Sync cursor for ...", meta: {
            source: "git", repo: "<name>", type: "sync_cursor",
            last_commit: "<last_sha>", last_date: "<last_date>", total_imported: 456
          }})
          ```
          If no cursor existed, create one in the same tree path.

      ## Scope Control

      - Incremental mode (via sync cursor) processes only new commits since the last import — re-running is cheap.
      - Pass `max` to limit commits per run. For initial backfill of large repos, run in batches, then re-run incrementally.
      - The sync cursor survives across runs and tracks cumulative progress.

      ## See Also
      - TypeScript skeleton — `me_memory_get({id: "019b0005-0002-7000-8000-000000000002"})`
      - Shell script & pseudocode — `me_memory_get({id: "019b0005-0003-7000-8000-000000000003"})`
      - Memory schema conventions — `me_memory_get({id: "019b0005-0004-7000-8000-000000000004"})`

  - id: "019b0005-0002-7000-8000-000000000002"
    tree: "typescript_skeleton"
    meta:
      type: "reference"
      topic: "git-history-typescript"
    content: |
      # TypeScript Script Skeleton — Git History Extraction

      Condensed reference derived from the working implementation at `integrations/git-history/git-history.ts`. Cross-runtime compatible (bun, node, deno).

      ## Dependencies

      ```typescript
      import { execFileSync } from "node:child_process";
      import { basename } from "node:path";
      import { createClient, type MeClient } from "@memoryengine/client";
      ```

      Uses `execFileSync` for git commands (cross-runtime) and `@memoryengine/client` for memory operations.

      ## Script

      ```typescript
      #!/usr/bin/env -S npx tsx

      import { execFileSync } from "node:child_process";
      import { basename } from "node:path";
      import { createClient, type MeClient } from "@memoryengine/client";

      // --- Git helper (safe, no shell injection) ---
      function git(...args: string[]): string {
        return execFileSync("git", args, { encoding: "utf-8", maxBuffer: 50 * 1024 * 1024 }).trim();
      }

      function shaExists(sha: string): boolean {
        try { git("cat-file", "-t", sha); return true; } catch { return false; }
      }

      function detectRepoName(): string {
        try {
          const url = git("remote", "get-url", "origin");
          const match = url.match(/\/([^/]+?)(?:\.git)?$/);
          if (match?.[1]) return match[1].toLowerCase().replace(/-/g, "_").replace(/[^a-z0-9_]/g, "");
        } catch {}
        return basename(process.cwd()).toLowerCase().replace(/-/g, "_").replace(/[^a-z0-9_]/g, "");
      }

      // --- Fetch commits with NUL delimiter ---
      interface Commit { sha: string; author: string; date: string; subject: string; }

      function fetchCommits(range?: string, opts?: { since?: string; max?: number; branch?: string }): Commit[] {
        const args = ["log", "--format=%H%x00%ae%x00%aI%x00%s", "--reverse"];
        if (range) args.push(range);
        if (opts?.since) args.push(`--after=${opts.since}`);
        if (opts?.max) args.push("-n", String(opts.max));
        if (opts?.branch && !range) args.push(opts.branch);

        let output: string;
        try { output = git(...args); } catch { return []; }
        if (!output) return [];

        return output.split("\n").map(line => {
          const parts = line.split("\0");
          return { sha: parts[0] ?? "", author: parts[1] ?? "", date: parts[2] ?? "", subject: parts.slice(3).join("\0") };
        });
      }

      // --- Sync cursor ---
      interface CursorMemory { id: string; meta: Record<string, unknown>; }

      async function findCursor(client: MeClient, repo: string): Promise<CursorMemory | null> {
        const result = await client.memory.search({ meta: { source: "git", repo, type: "sync_cursor" }, limit: 1 });
        const m = result.results[0];
        return m ? { id: m.id, meta: m.meta } : null;
      }

      async function upsertCursor(
        client: MeClient, cursor: CursorMemory | null,
        repo: string, treePath: string, lastSha: string, lastDate: string, totalImported: number,
      ): Promise<void> {
        const meta = { source: "git", repo, type: "sync_cursor", last_commit: lastSha, last_date: lastDate, total_imported: totalImported };
        const content = `Sync cursor for ${repo}. Last: ${lastSha.slice(0, 7)} (${lastDate}). Total: ${totalImported} commits.`;
        if (cursor) await client.memory.update({ id: cursor.id, content, meta });
        else await client.memory.create({ content, tree: treePath, meta });
      }

      // --- Main ---
      async function main() {
        const client = createClient({ server: process.env.ME_SERVER!, apiKey: process.env.ME_API_KEY! });
        const repo = detectRepoName();
        const treePath = `${repo}.git_history`;

        // 1. Find sync cursor
        const cursor = await findCursor(client, repo);
        let range: string | undefined;
        let previousTotal = 0;
        let sinceDate: string | undefined;

        if (cursor) {
          const lastSha = cursor.meta.last_commit as string;
          previousTotal = (cursor.meta.total_imported as number) ?? 0;
          if (shaExists(lastSha)) {
            range = `${lastSha}..HEAD`;
          } else {
            sinceDate = cursor.meta.last_date as string; // date fallback
          }
        }

        // 2. Fetch commits
        const allCommits = fetchCommits(range, { since: sinceDate });
        const IGNORE = [/^Merge branch\b/, /^Merge pull request\b/, /^Merge remote-tracking\b/];
        const commits = allCommits.filter(c => c.subject.trim() && !IGNORE.some(p => p.test(c.subject)));

        // 3. Bulk dedup (only when cursor SHA was missing — date fallback)
        let toProcess = commits;
        if (cursor && !range) {
          const recent = await client.memory.search({ meta: { source: "git", repo }, limit: 200, order_by: "desc" });
          const existing = new Set(recent.results.map(r => r.meta.commit as string));
          toProcess = commits.filter(c => !existing.has(c.sha));
        }

        // 4. Batch create
        const BATCH_SIZE = 50;
        let created = 0;
        const branchRef = git("symbolic-ref", "HEAD");

        for (let i = 0; i < toProcess.length; i += BATCH_SIZE) {
          const batch = toProcess.slice(i, i + BATCH_SIZE);
          const memories = batch.map(commit => {
            const body = git("log", "-1", "--format=%b", commit.sha);
            const files = git("diff-tree", "--no-commit-id", "--name-status", "-r", commit.sha).split("\n").filter(Boolean);
            let content = `# ${commit.subject}\n\n**Commit**: ${commit.sha.slice(0, 7)}\n**Author**: ${commit.author}\n**Date**: ${commit.date}\n`;
            if (body) content += `\n${body}\n`;
            if (files.length) { content += "\n## Files Changed\n"; for (const f of files) content += `- ${f}\n`; }
            return { content, tree: treePath, meta: { source: "git" as const, repo, commit: commit.sha, author: commit.author, branch: branchRef }, temporal: { start: commit.date } };
          });
          const result = await client.memory.batchCreate({ memories });
          created += result.ids.length;
        }

        // 5. Upsert sync cursor
        if (created > 0) {
          const last = toProcess[toProcess.length - 1]!;
          await upsertCursor(client, cursor, repo, treePath, last.sha, last.date, previousTotal + created);
        }

        console.log(`Done: ${created} created`);
      }

      main();
      ```

      ## Key Design Decisions

      - **`execFileSync` over `Bun.$`**: works in bun, node (`npx tsx`), and deno — no runtime lock-in
      - **NUL delimiter (`%x00`)**: pipe `|` breaks on commit messages containing `|`; NUL is safe in programmatic contexts (but use tab `\t` in shell scripts — see pseudocode memory)
      - **Sync cursor**: a dedicated memory with `meta.type: "sync_cursor"` tracks progress across runs, replacing per-commit dedup searches
      - **Bulk dedup**: only needed when cursor SHA is missing (force-push); one search replaces N+1 queries
      - **`batchCreate` in batches of 50**: single RPC call per batch, much faster than per-commit `create`

      ## Full Implementation

      See `integrations/git-history/git-history.ts` for the complete script with CLI args, `--dry-run`, error handling, and detailed logging.

