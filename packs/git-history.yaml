      - Pseudocode & CLI fallback — `me_memory_get({id: "019b0005-0003-7000-8000-000000000003"})`
      - Memory schema conventions — `me_memory_get({id: "019b0005-0004-7000-8000-000000000004"})`

  - id: "019b0005-0002-7000-8000-000000000002"
    tree: "typescript_skeleton"
    meta:
      type: "reference"
      topic: "git-history-typescript"
    content: |
      # TypeScript Script Skeleton — Git History Extraction

      Annotated reference implementation for building a git history extraction script. Adapt to your project's setup and me server configuration.

      ## Dependencies

      ```typescript
      import { $ } from "bun";
      ```

      Uses `Bun.$` for shell commands and direct MCP tool calls (or `@memoryengine/client`) for memory operations.

      ## Script

      ```typescript
      #!/usr/bin/env bun

      // --- Configuration ---
      type Depth = "metadata" | "files" | "diff_summary" | "full_diff";

      interface Config {
        repo: string;           // Detected or provided repo name
        treePrefix?: string;    // Optional prefix: "work.projects"
        depth: Depth;           // Default: "files"
        maxCommits: number;     // Default: 200
        pathFilters: string[];  // Restrict to these paths
        ignorePatterns: RegExp[]; // Skip commits matching these
      }

      // --- Detect repo name ---
      async function detectRepo(): Promise<string> {
        try {
          const url = (await $`git remote get-url origin`.text()).trim();
          // Extract repo name from URL: git@github.com:org/repo.git -> repo
          const match = url.match(/\/([^/]+?)(?:\.git)?$/);
          return match ? match[1].replace(/-/g, "_") : "unknown";
        } catch {
          // Fall back to directory name
          const dir = (await $`basename $(pwd)`.text()).trim();
          return dir.replace(/-/g, "_");
        }
      }

      // --- Parse CLI args ---
      function parseArgs(): Partial<Config> {
        const args = process.argv.slice(2);
        const config: Partial<Config> = {};
        for (let i = 0; i < args.length; i++) {
          switch (args[i]) {
            case "--repo": config.repo = args[++i]; break;
            case "--prefix": config.treePrefix = args[++i]; break;
            case "--depth": config.depth = args[++i] as Depth; break;
            case "--max": config.maxCommits = parseInt(args[++i]); break;
            case "--path": config.pathFilters = (config.pathFilters ?? []).concat(args[++i]); break;
          }
        }
        return config;
      }

      // --- Find last imported SHA (incremental mode) ---
      async function findLastSha(repo: string): Promise<string | null> {
        const results = await me.memory.search({
          meta: { source: "git", repo },
          limit: 1,
          order_by: "desc",
        });
        return results.length > 0 ? results[0].meta.commit : null;
      }

      // --- Fetch commits from git log ---
      async function fetchCommits(
        lastSha: string | null,
        maxCommits: number,
        pathFilters: string[]
      ): Promise<Array<{ sha: string; author: string; date: string; subject: string }>> {
        const range = lastSha ? `${lastSha}..HEAD` : `HEAD`;
        const pathArgs = pathFilters.length > 0 ? `-- ${pathFilters.join(" ")}` : "";
        const format = "%H|%ae|%aI|%s";

        const cmd = lastSha
          ? `git log --format='${format}' --reverse ${lastSha}..HEAD -${maxCommits} ${pathArgs}`
          : `git log --format='${format}' --reverse -${maxCommits} ${pathArgs}`;

        const output = (await $`sh -c ${cmd}`.text()).trim();
        if (!output) return [];

        return output.split("\n").map(line => {
          const [sha, author, date, ...rest] = line.split("|");
          return { sha, author, date, subject: rest.join("|") };
        });
      }

      // --- Get changed files for a commit ---
      async function getChangedFiles(sha: string): Promise<string[]> {
        const output = (await $`git diff-tree --no-commit-id --name-status -r ${sha}`.text()).trim();
        return output ? output.split("\n") : [];
      }

      // --- Format memory content ---
      function formatContent(
        commit: { sha: string; author: string; date: string; subject: string },
        body: string,
        files: string[],
        depth: Depth
      ): string {
        const short = commit.sha.slice(0, 7);
        let content = `# ${commit.subject}\n\n`;
        content += `**Commit**: ${short}\n`;
        content += `**Author**: ${commit.author}\n`;
        content += `**Date**: ${commit.date}\n`;

        if (body.trim()) content += `\n${body.trim()}\n`;
        if (depth !== "metadata" && files.length > 0) {
          content += `\n## Files Changed\n`;
          for (const f of files) content += `- ${f}\n`;
        }
        return content;
      }

      // --- Main ---
      async function main() {
        const args = parseArgs();
        const repo = args.repo ?? await detectRepo();
        const config: Config = {
          repo,
          treePrefix: args.treePrefix,
          depth: args.depth ?? "files",
          maxCommits: args.maxCommits ?? 200,
          pathFilters: args.pathFilters ?? [],
          ignorePatterns: [/^Merge branch/, /^Merge pull request/, /^chore: bump/],
        };

        const treePath = config.treePrefix
          ? `${config.treePrefix}.${repo}.git_history`
          : `${repo}.git_history`;

        console.log(`Repo: ${repo} | Tree: ${treePath} | Depth: ${config.depth}`);

        // Incremental check
        const lastSha = await findLastSha(repo);
        if (lastSha) console.log(`Incremental from: ${lastSha.slice(0, 7)}`);
        else console.log("Full backfill mode");

        const commits = await fetchCommits(lastSha, config.maxCommits, config.pathFilters);
        console.log(`Found ${commits.length} commits to process`);

        let created = 0;
        let skipped = 0;

        for (const commit of commits) {
          // Skip ignored patterns
          if (config.ignorePatterns.some(p => p.test(commit.subject))) {
            skipped++;
            continue;
          }

          // Dedup check
          const existing = await me.memory.search({ meta: { source: "git", commit: commit.sha } });
          if (existing.length > 0) { skipped++; continue; }

          // Get additional data based on depth
          const body = (await $`git log -1 --format='%b' ${commit.sha}`.text()).trim();
          const files = config.depth !== "metadata" ? await getChangedFiles(commit.sha) : [];

          const content = formatContent(commit, body, files, config.depth);

          await me.memory.create({
            content,
            tree: treePath,
            meta: {
              source: "git",
              repo,
              commit: commit.sha,
              author: commit.author,
              branch: "refs/heads/main",
            },
            temporal: { start: commit.date },
          });

          created++;
          if (created % 25 === 0) console.log(`Progress: ${created} created, ${skipped} skipped`);
        }

        console.log(`Done: ${created} created, ${skipped} skipped`);
      }

      main();
      ```

      ## Adapting This Skeleton

      - Replace `me.memory.search` / `me.memory.create` with your actual client calls (MCP tools, REST API, or `@memoryengine/client`)
      - Add `diff_summary` and `full_diff` depth support by extending `formatContent`
      - For `diff_summary`: `git diff-tree --stat <sha>`
      - For `full_diff`: `git diff-tree -p <sha>` (warning: may exceed token limits)
      - Add batch creation for better throughput on large backfills

