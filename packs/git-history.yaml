    content: |
      # Pseudocode & CLI Fallback — Git History Extraction

      Language-agnostic algorithm and equivalent `me` CLI commands for extracting git history into memory engine. Use this when building in Python, Go, shell script, or any language without a TypeScript runtime.

      ## Algorithm Pseudocode

      ```
      function extract_git_history(config):
          repo = detect_repo_name()
          tree = build_tree_path(config.prefix, repo)

          # Step 1: Incremental check
          last_sha = null
          results = me.memory.search(meta={source: "git", repo: repo}, limit=1, order_by="desc")
          if results is not empty:
              last_sha = results[0].meta.commit

          # Step 2: Fetch commits
          if last_sha:
              commits = git_log(range=last_sha + "..HEAD", max=config.max_commits)
          else:
              commits = git_log(max=config.max_commits)

          # Step 3: Process each commit
          for commit in commits:
              # Skip ignored patterns
              if any(pattern.matches(commit.subject) for pattern in config.ignore):
                  continue

              # Dedup check
              existing = me.memory.search(meta={source: "git", commit: commit.sha})
              if existing is not empty:
                  continue

              # Build content
              content = format_commit(commit, config.depth)

              # Create memory
              me.memory.create(
                  content=content,
                  tree=tree,
                  meta={
                      source: "git",
                      repo: repo,
                      commit: commit.sha,
                      author: commit.author,
                      branch: commit.branch
                  },
                  temporal={start: commit.date}
              )
      ```

      ## Equivalent `me` CLI Commands

      ### Incremental Check — Find Last Imported SHA

      ```bash
      me memory search \
        --meta '{"source": "git", "repo": "my_api"}' \
        --order-by desc \
        --limit 1
      ```

      Parse the JSON output to extract `meta.commit` from the first result.

      ### Dedup Check — Does This Commit Exist?

      ```bash
      me memory search \
        --meta '{"source": "git", "commit": "a1b2c3d4e5f6..."}' \
        --limit 1
      ```

      If output contains results, skip this commit.

      ### Create a Memory

      ```bash
      me memory create \
        --content "$(cat <<'CONTENT'
      # Add rate limiting middleware

      **Commit**: a1b2c3d
      **Author**: dev@example.com
      **Date**: 2026-02-15T10:30:00Z

      ## Files Changed
      - A src/middleware/rate-limit.ts
      - M src/server/routes.ts
      CONTENT
      )" \
        --tree "my_api.git_history" \
        --meta '{"source": "git", "repo": "my_api", "commit": "a1b2c3d4...", "author": "dev@example.com", "branch": "refs/heads/main"}' \
        --temporal '{"start": "2026-02-15T10:30:00Z"}'
      ```

      ### Shell Script Loop

      ```bash
      #!/bin/bash
      REPO="my_api"
      TREE="${REPO}.git_history"
      MAX=200

      # Get last imported SHA
      LAST_SHA=$(me memory search --meta "{\"source\":\"git\",\"repo\":\"${REPO}\"}" --order-by desc --limit 1 \
        | jq -r '.[0].meta.commit // empty')

      # Build git log range
      if [ -n "$LAST_SHA" ]; then
        RANGE="${LAST_SHA}..HEAD"
      else
        RANGE="HEAD"
      fi

      # Process commits
      git log --format='%H|%ae|%aI|%s' --reverse -${MAX} ${RANGE} | while IFS='|' read SHA AUTHOR DATE SUBJECT; do
        # Skip merge commits
        echo "$SUBJECT" | grep -qE '^Merge (branch|pull request)' && continue

        # Dedup check
        EXISTING=$(me memory search --meta "{\"source\":\"git\",\"commit\":\"${SHA}\"}" --limit 1 | jq length)
        [ "$EXISTING" -gt 0 ] && continue

        # Get changed files
        FILES=$(git diff-tree --no-commit-id --name-status -r "$SHA" | sed 's/^/- /')

        # Create memory
        CONTENT="# ${SUBJECT}

      **Commit**: ${SHA:0:7}
      **Author**: ${AUTHOR}
      **Date**: ${DATE}

      ## Files Changed
      ${FILES}"

        me memory create \
          --content "$CONTENT" \
          --tree "$TREE" \
          --meta "{\"source\":\"git\",\"repo\":\"${REPO}\",\"commit\":\"${SHA}\",\"author\":\"${AUTHOR}\",\"branch\":\"refs/heads/main\"}" \
          --temporal "{\"start\":\"${DATE}\"}"
      done
      ```

      ## Python Equivalent

      Use `subprocess.run()` for git commands and `requests` or the me Python client for memory operations. The algorithm is identical — only the syntax changes.

