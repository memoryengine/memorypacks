    tree: "schema"
    meta:
      type: "reference"
      topic: "git-history-schema"
    content: |
      # Memory Schema Conventions — Git History

      Exact conventions for git commit memories created by the git history extraction skill. Follow these to ensure consistency, searchability, and interoperability.

      ## Tree Path

      Format: `<optional_prefix>.<repo_name>.git_history`

      | Configuration | Tree Path |
      |--------------|-----------|
      | Default (no prefix) | `my_api.git_history` |
      | With prefix | `work.projects.my_api.git_history` |

      The repo name must be ltree-safe: lowercase, underscores only. Convert hyphens to underscores (`my-api` → `my_api`).

      ## Commit Memory — Meta Fields

      ```json
      {
        "source": "git",
        "repo": "<repo_name>",
        "commit": "<full_40_char_sha>",
        "author": "<author_email>",
        "branch": "<branch_ref>"
      }
      ```

      | Field | Type | Required | Purpose |
      |-------|------|----------|---------|
      | `source` | string | Yes | Always `"git"` — enables filtering all git-sourced memories |
      | `repo` | string | Yes | ltree-safe repo name — scopes searches to one repo |
      | `commit` | string | Yes | Full 40-character SHA — unique key for dedup |
      | `author` | string | Yes | Author email — enables per-author queries |
      | `branch` | string | No | Branch ref (e.g., `refs/heads/main`) — useful for multi-branch imports |

      ## Sync Cursor Memory

      A dedicated memory that tracks incremental sync progress. One per repo, stored in the same tree as commit memories.

      ### Meta Fields

      ```json
      {
        "source": "git",
        "repo": "<repo_name>",
        "type": "sync_cursor",
        "last_commit": "<full_40_char_sha>",
        "last_date": "<iso_date>",
        "total_imported": 123
      }
      ```

      | Field | Type | Purpose |
      |-------|------|---------|
      | `source` | string | Always `"git"` |
      | `repo` | string | ltree-safe repo name |
      | `type` | string | Always `"sync_cursor"` — distinguishes from commit memories |
      | `last_commit` | string | Full SHA of the last successfully imported commit |
      | `last_date` | string | ISO date of the last imported commit — fallback if SHA is gone |
      | `total_imported` | number | Running count of all commits imported across all runs |

      ### Content

      ```
      Sync cursor for my_api. Last: a1b2c3d (2026-02-15T10:30:00Z). Total: 456 commits.
      ```

      ### Search Pattern

      ```
      me_memory_search({meta: {source: "git", repo: "my_api", type: "sync_cursor"}, limit: 1})
      ```

      ## Temporal

      The temporal format differs between the MCP API and CLI import:

      ### MCP API (`me_memory_create` / `me_memory_update`)
      Uses an object with start/end fields:
      ```json
      {"start": "2026-02-15T10:30:00Z", "end": null}
      ```

      ### CLI import (`me memory import`)
      Uses a **plain ISO string**:
      ```yaml
      temporal: "2026-02-15T10:30:00Z"
      ```

      **IMPORTANT:** These formats are NOT interchangeable. Using the object format `{start: "..."}` in a YAML import file will cause `Invalid temporal: Invalid input` errors.

      Point-in-time only (no end date). Uses the commit's author date in ISO 8601 format. This enables temporal range queries like "what changed last week."

      ## Content Template — Depth Levels

      ### `metadata` — Minimal

      ```markdown
      # <commit_subject>

      **Commit**: <sha_short>
      **Author**: <author_email>
      **Date**: <iso_date>

      <commit_body_if_present>
      ```

      ### `files` — Default

      ```markdown
      # <commit_subject>

      **Commit**: <sha_short>
      **Author**: <author_email>
      **Date**: <iso_date>

      <commit_body_if_present>

      ## Files Changed
      - M src/auth.ts
      - A src/middleware/rate-limit.ts
      - D src/legacy/old-auth.ts
      ```

      File status prefixes: `A` (added), `M` (modified), `D` (deleted), `R` (renamed).

      **YAML block scalar warning:** Lines starting with `- ` (like the file list above) will be misinterpreted as YAML list items if not properly indented inside a `content: |` block. Ensure all content lines are indented at least 4 spaces (2 levels beyond the list item's `content` key).

      ## YAML Import Format

      The `me memory import` CLI expects a **flat YAML list** — no envelope, no `memories:` wrapper:

      ```yaml
      - content: |
