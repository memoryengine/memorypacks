  tree: "reference.pack_authoring.id_versioning"
  meta:
    pack:
      name: "pack-authoring"
      version: "0.1.0"
    type: "reference"
    topic: "id-versioning"
  content: |
    # ID Allocation and Version Management

    Memory packs use deterministic UUIDv7 IDs for idempotent imports. This engram covers the mechanics of claiming IDs and managing versions.

    ## Claiming a Prefix

    Before writing a pack, claim a unique 8-character prefix in `registry.yaml` in the memorypacks repository. Each pack gets one prefix that is never reused.

    ```yaml
    # registry.yaml
    prefixes:
      "019b0000": git-history
      "019b0100": project-bootstrap
      "019b0001": pack-authoring
      "019b0300": your-new-pack       # ← claim the next sequential value
    ```

    Prefix allocation is first-come-first-served via pull request. The CI pipeline validates that no two packs share a prefix.

    ## ID Format

    The format is: `<prefix>-NNNN-7000-8000-NNNNNNNNNNNN`

    Breaking it down:
    ```
    019b0001-0001-7000-8000-000000000001
    ^^^^^^^^ ^^^^ ^ ^^^ ^    ^^^^^^^^^^^^
    prefix   seq  │  │  │    seq (repeated or extended)
                  │  │  └── RFC 9562 variant (must be 8, 9, a, or b)
                  │  └───── UUIDv7 version (must be 7)
                  └──────── part of the sequence
    ```

    The `7` at position 14 and `8` at position 19 are required by the UUID specification. Without them, the ID fails UUIDv7 validation and `me pack validate` will reject it.

    For the trailing 12 digits, mirror the sequence number. The first engram uses `000000000001`, the second `000000000002`, and so on. This is a convention for readability, not a hard requirement — any valid hex digits work.

    ## Sequential Numbering

    Number engrams sequentially within a pack:
    ```
    019b0001-0001-7000-8000-000000000001   # First engram
    019b0001-0002-7000-8000-000000000002   # Second engram
    019b0001-0003-7000-8000-000000000003   # Third engram
    ```

    If you expect to insert engrams between existing ones in a future version, leave gaps:
    ```
    019b0001-0010-7000-8000-000000000010   # Topic A
    019b0001-0020-7000-8000-000000000020   # Topic B
    019b0001-0030-7000-8000-000000000030   # Topic C
    ```

    Gaps don't affect functionality — IDs are opaque identifiers to the system.

    ## Version Management

    Pack version lives in `meta.pack.version` on every engram. All engrams in a file must share the same version.

    ### Bumping a Version

    When you release a new version of your pack:
    1. Update `meta.pack.version` on every engram (e.g., `"0.1.0"` → `"0.2.0"`)
    2. Keep IDs stable for existing engrams — do not change their IDs
    3. Assign the next sequential ID for any new engrams
    4. Remove engrams you no longer want from the YAML file

    ### What Happens on Import

    `me pack import` handles version transitions automatically:

    1. Searches for existing engrams with the same `meta.pack.name`
    2. Any existing engram with a different `meta.pack.version` is marked as stale
    3. Stale engrams are deleted
    4. New engrams are upserted (deterministic IDs → `ON CONFLICT (id) DO UPDATE`)

    This means:
    - **Updated engrams** (same ID, new content): upserted in place
    - **New engrams** (new ID): inserted
    - **Removed engrams** (ID not in new file): deleted as stale
    - **Re-importing same version**: idempotent, no-op upsert

    ### Version Numbering

    Use semantic versioning: `MAJOR.MINOR.PATCH`
    - **PATCH** (0.1.0 → 0.1.1): Typo fixes, minor wording improvements
    - **MINOR** (0.1.0 → 0.2.0): New engrams added, existing content expanded
    - **MAJOR** (0.1.0 → 1.0.0): Significant restructuring, engrams removed or fundamentally rewritten

    There is no enforcement of semver — this is guidance for pack authors and consumers.

