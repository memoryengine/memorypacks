  tree: "reference.pack_authoring.quality"
  meta:
    pack:
      name: "pack-authoring"
      version: "0.1.0"
    type: "reference"
    topic: "quality-checklist"
  content: |
    # Quality Checklist and Common Pitfalls

    Run through this checklist before publishing a pack. Then review the pitfalls section to catch mistakes that validation alone won't find.

    ## Pre-Publish Checklist

    1. **Validation passes**: `me pack validate your-pack.yaml` exits 0
    2. **Token count**: Each engram's content is under 8192 tokens (check with `bun scripts/count-tokens.ts`)
    3. **Dry-run preview**: `me pack import --dry-run your-pack.yaml` shows expected counts
    4. **Self-contained**: Each engram makes sense read in isolation
    5. **Consistent meta.pack**: Every engram has identical `name` and `version`
    6. **No duplication**: Content doesn't repeat what's in the bundled skills (0034-0036)
    7. **Tree paths valid**: All lowercase, only `[a-z0-9_]` per label, dot-separated
    8. **IDs valid**: Format `<prefix>-NNNN-7000-8000-NNNNNNNNNNNN`, prefix claimed in registry
    9. **Header comment**: File starts with `# Pack:`, `# Version:`, `# Description:`, `# ID prefix:`

    ## Common Pitfalls

    ### Structural Mistakes

    **Forgetting `meta.pack` on one engram.**
    Every engram needs it, not just the first one. Validation catches this, but it's the most common error during initial authoring. Copy the meta block from your first engram as a starting point for each new one.

    **Inconsistent name or version across engrams.**
    If one engram says `version: "0.1.0"` and another says `version: "0.1"`, validation fails. Use exact string matches. Copy-paste the meta block rather than retyping it.

    **Tree paths with hyphens or uppercase.**
    ltree requires `[a-z0-9_]` per label. `reference.pack-authoring` fails — use `reference.pack_authoring`. `reference.PostgreSQL` fails — use `reference.postgresql`. Validation catches invalid ltree syntax.

    **ID format errors.**
    The `7` at position 14 and `8` at position 19 are mandatory (UUIDv7 version + RFC 9562 variant). `019b0001-0001-0000-0000-000000000001` fails validation. Use the template: `<prefix>-NNNN-7000-8000-NNNNNNNNNNNN`.

    ### Content Mistakes

    **Token overflow on skill engrams.**
    Long skill engrams with detailed examples can exceed the 8192 token embedding limit. The content still imports fine, but the embedding will be truncated or fail, degrading semantic search. Check token counts during authoring, not after.

    To fix: split the skill into a concise procedure engram and a separate reference engram with the detailed examples. The skill engram references the examples by ID.

    **Vague skill instructions.**
    "Extract useful information" gives an agent no actionable direction. "Run `git log --oneline -50`, for each non-trivial commit call `me_engram_create` with..." does. Use exact commands, exact tool names, and exact field names.

    **Missing scope control.**
    Without explicit limits, agents process everything. A skill that says "analyze the codebase" on a large project will run for hours creating hundreds of low-quality engrams. Always set defaults: "last 50 commits", "top-level `src/` files only", "maximum 20 engrams."

    **Missing duplicate-check step in skills.**
    Skills are meant to be re-runnable. Without a search-before-create step, every execution adds duplicates. Include: `me_engram_search({meta: {source: "...", key: "..."}})` and skip creation if a match exists.

    **Leaving tree and meta to agent judgment.**
    Don't write "organize the engrams appropriately." Write `tree: "work.projects.<name>.history"` and `meta: {source: "git", commit: "<sha>"}`. Agents produce consistent, searchable output when given exact conventions.

    ### Ecosystem Mistakes

    **ID prefix collision.**
    Two packs using the same prefix will overwrite each other's engrams on import. Always claim your prefix in `registry.yaml` before writing. The CI validation script (`validate.sh`) catches collisions.

    **Duplicating bundled skill content.**
    Skills 0034-0036 already cover pack concepts, CLI usage, and format basics. A pack that repeats this content wastes tokens and creates confusion when the bundled version is updated but the pack version isn't. Go deeper or cover different topics instead.

    **Not testing the full cycle.**
    `me pack validate` catches structural errors but not content quality issues. Always do a full import cycle on a test instance:
    ```bash
    me pack validate your-pack.yaml        # Structure OK?
    me pack import --dry-run your-pack.yaml # Counts look right?
    me pack import your-pack.yaml           # Actually import
    me engram search --semantic "your topic" # Do the engrams surface for relevant queries?
    ```

